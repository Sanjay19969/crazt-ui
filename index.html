<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Kinetic Chaos Form - Angry Edition</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
    <style>
        /* Base Reset and Background */
        body,
        html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            user-select: none;
        }

        /* Glassmorphism UI Elements */
        .glass-elem {
            position: absolute;
            top: 0;
            left: 0;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 12px;
            color: #fff;
            padding: 15px 20px;
            outline: none;
            transition: box-shadow 0.3s ease, border-color 0.3s ease;
            transform-origin: center center;
            pointer-events: auto;
            z-index: 10;
            font-size: 16px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
            user-select: text;
        }

        .glass-elem::placeholder {
            color: rgba(255, 255, 255, 0.6);
        }

        .glass-elem:focus {
            box-shadow: 0 0 20px rgba(0, 255, 255, 0.6);
            border-color: rgba(0, 255, 255, 0.9);
            background: rgba(255, 255, 255, 0.1);
        }

        input[type="text"],
        input[type="email"] {
            width: 250px;
            height: 50px;
            box-sizing: border-box;
        }

        textarea {
            width: 300px;
            height: 120px;
            box-sizing: border-box;
            resize: none;
        }

        #submit-weight {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 800;
            background: radial-gradient(circle, rgba(255, 70, 70, 0.4) 0%, rgba(200, 0, 0, 0.6) 100%);
            border: 2px solid rgba(255, 100, 100, 0.8);
            cursor: grab;
            user-select: none;
            text-shadow: 0 0 5px #fff;
            letter-spacing: 1px;
            box-shadow: 0 0 20px rgba(255, 0, 0, 0.4);
            z-index: 20;
        }

        #submit-weight:active {
            cursor: grabbing;
        }

        #drop-zone {
            position: absolute;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            width: 250px;
            height: 100px;
            border: 2px dashed rgba(0, 255, 150, 0.5);
            border-radius: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: rgba(0, 255, 150, 0.8);
            text-transform: uppercase;
            font-weight: bold;
            letter-spacing: 2px;
            z-index: 5;
            background: rgba(0, 0, 0, 0.4);
            transition: all 0.3s ease;
        }

        #drop-zone.active {
            background: rgba(0, 255, 150, 0.3);
            border-color: #0f9;
            box-shadow: 0 0 40px rgba(0, 255, 150, 0.6);
            color: #fff;
        }

        /* Modal Styles */
        #custom-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(15px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            opacity: 1;
            transition: opacity 0.4s ease;
        }

        #custom-modal.hidden {
            opacity: 0;
            pointer-events: none;
        }

        .modal-content {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 40px;
            border-radius: 24px;
            text-align: center;
            color: white;
            max-width: 400px;
            transition: transform 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        #modal-emoji {
            font-size: 80px;
            display: block;
            margin-bottom: 10px;
        }

        #modal-title {
            margin: 10px 0;
            font-size: 28px;
        }

        #modal-text {
            opacity: 0.8;
            margin-bottom: 25px;
            line-height: 1.5;
        }

        .modal-content button {
            padding: 12px 30px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid white;
            color: white;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.2s;
        }

        .modal-content button:hover {
            background: white;
            color: black;
        }
    </style>
</head>

<body>

    <div id="drop-zone">
        Drop Submit Here
        <span style="font-size: 10px; opacity: 0.6;">(Validation Required)</span>
    </div>

    <input type="text" id="input-name" class="glass-elem" placeholder="Enter your Name" autocomplete="off" />
    <input type="email" id="input-email" class="glass-elem" placeholder="Enter your Email" autocomplete="off" />
    <textarea id="input-message" class="glass-elem" placeholder="Type your message..."></textarea>

    <div id="submit-weight" class="glass-elem" draggable="false">SUBMIT</div>

    <div id="custom-modal" class="hidden">
        <div class="modal-content" id="modal-box">
            <span id="modal-emoji">🎉</span>
            <h2 id="modal-title">Success!</h2>
            <p id="modal-text">Message sent.</p>
            <button onclick="resetExperiment()">Continue Chaos</button>
        </div>
    </div>

    <script>
        const Engine = Matter.Engine, Runner = Matter.Runner, Bodies = Matter.Bodies, Composite = Matter.Composite, Events = Matter.Events;
        const engine = Engine.create();
        engine.world.gravity.y = 0;

        let bodiesMap = [];
        let walls = [];
        let submitted = false;
        let isDraggingSubmit = false;
        let submitBodyRef = null;

        window.onload = () => initPhysics();

        function initPhysics() {
            createWalls();
            const formElements = [
                { id: 'input-name', type: 'rect' },
                { id: 'input-email', type: 'rect' },
                { id: 'input-message', type: 'rect' },
                { id: 'submit-weight', type: 'circle', radius: 50 }
            ];

            formElements.forEach(item => {
                const el = document.getElementById(item.id);
                const rect = el.getBoundingClientRect();
                const startX = (window.innerWidth / 2) + (Math.random() - 0.5) * 400;
                const startY = (window.innerHeight / 2) + (Math.random() - 0.5) * 400;

                let body;
                if (item.type === 'rect') {
                    body = Bodies.rectangle(startX, startY, rect.width, rect.height, {
                        restitution: 0.8, frictionAir: 0.03, density: 0.001
                    });
                    Matter.Body.setInertia(body, Infinity);
                } else {
                    body = Bodies.circle(startX, startY, item.radius, {
                        restitution: 0.4, frictionAir: 0.05, density: 0.05
                    });
                }

                Composite.add(engine.world, body);
                bodiesMap.push({ el, body, id: item.id });

                if (el.tagName === 'INPUT' || el.tagName === 'TEXTAREA') {
                    el.addEventListener('focus', () => {
                        if (submitted) return;
                        Matter.Body.setStatic(body, true);
                    });
                    el.addEventListener('blur', () => {
                        if (submitted) return;
                        Matter.Body.setStatic(body, false);
                        Matter.Body.applyForce(body, body.position, { x: (Math.random() - 0.5) * 0.02, y: (Math.random() - 0.5) * 0.02 });
                    });
                }
            });

            const runner = Runner.create();
            Runner.run(runner, engine);
            requestAnimationFrame(syncVisuals);
        }

        function createWalls() {
            if (walls.length > 0) Composite.remove(engine.world, walls);
            const wallOptions = { isStatic: true, restitution: 0.8 };
            walls = [
                Bodies.rectangle(window.innerWidth / 2, -50, 5000, 100, wallOptions),
                Bodies.rectangle(window.innerWidth / 2, window.innerHeight + 50, 5000, 100, wallOptions),
                Bodies.rectangle(-50, window.innerHeight / 2, 100, 5000, wallOptions),
                Bodies.rectangle(window.innerWidth + 50, window.innerHeight / 2, 100, 5000, wallOptions)
            ];
            Composite.add(engine.world, walls);
        }

        window.addEventListener('resize', createWalls);

        let mousePos = { x: -1000, y: -1000 };
        document.addEventListener('mousemove', (e) => { mousePos.x = e.clientX; mousePos.y = e.clientY; });

        Events.on(engine, 'beforeUpdate', () => {
            if (submitted) return;
            bodiesMap.forEach(({ body, el }) => {
                if (body.isStatic) return;
                const dx = body.position.x - mousePos.x, dy = body.position.y - mousePos.y;
                const dist = Math.sqrt(dx * dx + dy * dy);
                if (dist < 200 && el.id !== 'submit-weight' && !isDraggingSubmit) {
                    const force = 0.001 * body.mass * (200 - dist) / 200;
                    Matter.Body.applyForce(body, body.position, { x: (dx / dist) * force, y: (dy / dist) * force });
                }
            });
        });

        // Submit Drag Logic
        const submitEl = document.getElementById('submit-weight');
        submitEl.addEventListener('mousedown', () => {
            if (submitted) return;
            isDraggingSubmit = true;
            submitBodyRef = bodiesMap.find(b => b.id === 'submit-weight').body;
            Matter.Body.setStatic(submitBodyRef, true);
        });

        document.addEventListener('mousemove', (e) => {
            if (isDraggingSubmit && submitBodyRef) {
                Matter.Body.setPosition(submitBodyRef, { x: e.clientX, y: e.clientY });
                const dz = document.getElementById('drop-zone').getBoundingClientRect();
                if (e.clientX > dz.left && e.clientX < dz.right && e.clientY > dz.top && e.clientY < dz.bottom) {
                    document.getElementById('drop-zone').classList.add('active');
                } else {
                    document.getElementById('drop-zone').classList.remove('active');
                }
            }
        });

        document.addEventListener('mouseup', () => {
            if (isDraggingSubmit && submitBodyRef) {
                isDraggingSubmit = false;
                Matter.Body.setStatic(submitBodyRef, false);
                const dz = document.getElementById('drop-zone').getBoundingClientRect();
                if (submitBodyRef.position.x > dz.left && submitBodyRef.position.x < dz.right &&
                    submitBodyRef.position.y > dz.top && submitBodyRef.position.y < dz.bottom) {
                    executeSubmission();
                }
                submitBodyRef = null;
            }
        });

        function executeSubmission() {
            const name = document.getElementById('input-name').value.trim();
            const email = document.getElementById('input-email').value.trim();
            const msg = document.getElementById('input-message').value.trim();

            const modal = document.getElementById('custom-modal');
            const mEmoji = document.getElementById('modal-emoji');
            const mTitle = document.getElementById('modal-title');
            const mText = document.getElementById('modal-text');
            const mBox = document.getElementById('modal-box');

            // --- VALIDATION CHECK ---
            if (!name || !email || !msg) {
                mEmoji.innerText = "😡";
                mTitle.innerText = "INCOMPLETE!";
                mTitle.style.color = "#ff4d4d";
                mText.innerText = "The chaos demands data. Fill in all fields before submitting!";
                mBox.style.boxShadow = "0 0 50px rgba(255, 0, 0, 0.5)";
                modal.classList.remove('hidden');

                // Punishment: Shake the elements
                bodiesMap.forEach(({ body }) => {
                    Matter.Body.applyForce(body, body.position, {
                        x: (Math.random() - 0.5) * 0.1,
                        y: (Math.random() - 0.5) * 0.1
                    });
                });
                return;
            }

            // --- SUCCESS FLOW ---
            submitted = true;
            mEmoji.innerText = "🎉";
            mTitle.innerText = "Chaos Conquered!";
            mTitle.style.color = "#00ffff";
            mText.innerText = "Your message has been sent through the void.";
            mBox.style.boxShadow = "0 0 50px rgba(0, 255, 255, 0.3)";

            const centerX = window.innerWidth / 2, centerY = window.innerHeight / 2;
            bodiesMap.forEach(({ body, el }) => {
                Matter.Body.setStatic(body, false);
                el.blur();
                const dx = body.position.x - centerX, dy = body.position.y - centerY;
                const dist = Math.sqrt(dx * dx + dy * dy) || 1;
                Matter.Body.applyForce(body, body.position, { x: (dx / dist) * body.mass * 0.25, y: (dy / dist) * body.mass * 0.25 });
            });

            setTimeout(() => modal.classList.remove('hidden'), 600);
        }

        function syncVisuals() {
            bodiesMap.forEach(({ body, el }) => {
                el.style.transform = `translate(${body.position.x - el.offsetWidth / 2}px, ${body.position.y - el.offsetHeight / 2}px) rotate(${body.angle}rad)`;
            });
            requestAnimationFrame(syncVisuals);
        }

        function resetExperiment() {
            document.getElementById('custom-modal').classList.add('hidden');
            document.getElementById('drop-zone').classList.remove('active');

            if (submitted) {
                document.querySelectorAll('.glass-elem').forEach(el => { if (el.tagName !== 'DIV') el.value = ''; });
                bodiesMap.forEach(({ body }) => {
                    Matter.Body.setPosition(body, {
                        x: window.innerWidth / 2 + (Math.random() - 0.5) * 200,
                        y: window.innerHeight / 2 + (Math.random() - 0.5) * 200
                    });
                    Matter.Body.setVelocity(body, { x: 0, y: 0 });
                });
                submitted = false;
            }
        }
    </script>
</body>

</html>
